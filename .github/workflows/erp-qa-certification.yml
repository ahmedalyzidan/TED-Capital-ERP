name: ERP QA Certification & Production Readiness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  certify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: erp_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        cd backend/client && npm install

    - name: Initialize Test Database
      env:
        PGPASSWORD: password
      run: |
        psql -h localhost -U postgres -d erp_db -f full_schema_v29.sql
        node backend/initDb.js

    - name: Start ERP Backend
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASSWORD: password
        DB_DATABASE: erp_db
        JWT_SECRET: test-secret
      run: |
        node backend/server.js &
        sleep 10

    - name: Start ERP Frontend
      run: |
        cd backend/client && npm run build
        cd ../.. && npm install -g serve
        serve -s backend/client/dist -l 5173 &
        sleep 5

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Execute Certification Suite (Local Emulation)
      env:
        SKIP_DB_CHECK: '0'
      run: |
        cd playwright-e2e-tests
        npx playwright test

    - name: Execute Production Smoke Test
      if: success()
      env:
        SKIP_DB_CHECK: '1'
      run: |
        cd playwright-e2e-tests
        npx playwright test --config=playwright.prod.config.js

    - name: Upload Certification Artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: erp-certification-report
        path: |
          Mega_ERP_Certification_Report.md
          ERP_Traceability_Matrix.md
          playwright-e2e-tests/playwright-report/
          playwright-e2e-tests/test-results/
