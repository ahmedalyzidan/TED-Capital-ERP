version: '3.8'

services:
  db-staging:
    image: postgres:16-alpine
    container_name: erp-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STAGING_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:-staging_pass}
      POSTGRES_DB: ${STAGING_DB_NAME:-erp_db_staging}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network-staging

  backend-staging:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: erp-backend-staging
    restart: unless-stopped
    environment:
      DB_HOST: db-staging
      DB_USER: ${STAGING_DB_USER:-postgres}
      DB_PASS: ${STAGING_DB_PASSWORD:-staging_pass}
      DB_DATABASE: ${STAGING_DB_NAME:-erp_db_staging}
      JWT_SECRET: ${JWT_SECRET:-staging-secret-key-123}
      PORT: 5000
      NODE_ENV: staging
    depends_on:
      db-staging:
        condition: service_healthy
    volumes:
      - erp_uploads_staging:/app/uploads
    networks:
      - erp-network-staging

  frontend-staging:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: erp-frontend-staging
    restart: unless-stopped
    volumes:
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      backend-staging:
        condition: service_started
    networks:
      - erp-network-staging

networks:
  erp-network-staging:
    driver: bridge

volumes:
  postgres_data_staging:
  erp_uploads_staging:

